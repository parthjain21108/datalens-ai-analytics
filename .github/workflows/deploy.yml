name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
  ECS_CLUSTER: dataapp-cluster

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Lint backend
        run: npx eslint src || true
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test

  # ── 2. Build & Push Docker Images ───────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      frontend-image: ${{ steps.meta-fe.outputs.tags }}
      backend-image:  ${{ steps.meta-be.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        id: meta-fe
        run: |
          IMAGE=$ECR_REGISTRY/dataapp-frontend:${{ github.sha }}
          docker build -t $IMAGE ./frontend
          docker push $IMAGE
          echo "tags=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build & push backend
        id: meta-be
        run: |
          IMAGE=$ECR_REGISTRY/dataapp-backend:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          echo "tags=$IMAGE" >> $GITHUB_OUTPUT

  # ── 3. Deploy to ECS Fargate ─────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Force ECS service redeployment (frontend)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service dataapp-frontend \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Force ECS service redeployment (backend)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service dataapp-backend \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services dataapp-frontend dataapp-backend \
            --region $AWS_REGION
